services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: magna-readacross-api
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Cors__AllowedOrigins: http://localhost:4200
      # Wire API to the already-seeded local SQL Server container on host port 14333.
      ConnectionStrings__AzureSqlDb: Server=host.docker.internal,14333;Database=MagnaReadAcross;User Id=sa;Password=Magna#Seed2026!;Encrypt=False;TrustServerCertificate=True;Connection Timeout=30;
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: magna-readacross-web
    ports:
      - "4200:80"
    depends_on:
      - api
    # The .mp4 files in `web/src/assets/videos/` are git-LFS pointer stubs
    # (~134 bytes each) so the bundled image cannot serve real videos.
    # Mount the legacy public asset trees over the nginx web-root so the
    # browser receives the full binaries (~2.4 GB videos, ~few MB slides)
    # without bloating the docker image.
    volumes:
      - ../magna-readacross/public/videos:/usr/share/nginx/html/videos:ro
      - ../magna-readacross/public/slides:/usr/share/nginx/html/slides:ro
